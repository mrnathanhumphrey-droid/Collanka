name: Build Collonka

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Win64
            cmake_generator: Ninja
            artifact_name: Collonka_Win64
          - os: macos-14
            name: macOS
            cmake_generator: Ninja
            artifact_name: Collonka_macOS

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja -y

      - name: Install Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Clone JUCE
        run: git clone --depth 1 --branch 8.0.12 https://github.com/juce-framework/JUCE.git JUCE

      # ---- Configure ----
      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: >
          cmake -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"
          -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0
          -DBUILD_AU=OFF

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      # ---- Build ----
      - name: Build
        run: cmake --build build --config Release -j 3

      # ---- macOS: ad-hoc sign + validate ----
      - name: Sign and Validate (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          # Find artifact root (Ninja single-config: no Release subdir)
          ARTS="build/Collonka_artefacts"
          if [ ! -d "$ARTS/VST3" ] && [ -d "$ARTS/Release/VST3" ]; then
            ARTS="$ARTS/Release"
          fi

          echo "Artifact root: $ARTS"

          # Fix moduleinfo.json — JUCE's vst3_helper generates trailing commas
          # which is invalid JSON and causes hosts to reject the VST3 at scan time
          find "$ARTS" -name "moduleinfo.json" | while IFS= read -r jsonfile; do
            echo "Fixing trailing commas in: $jsonfile"
            sed -i.bak -E 's/,([[:space:]]*[}\]])/\1/g' "$jsonfile"
            rm -f "${jsonfile}.bak"
          done

          # Ad-hoc sign all bundles (removes quarantine issues for non-notarized builds)
          find "$ARTS" -name "*.vst3" -type d -exec codesign --force --deep --sign - {} \;
          find "$ARTS" -name "*.component" -type d -exec codesign --force --deep --sign - {} \;
          find "$ARTS" -name "*.app" -type d -exec codesign --force --deep --sign - {} \;

          # Validate AU with auval (non-fatal — just log the result)
          echo "=== AU Validation ==="
          auval -v aumu Clnk Bwmx 2>&1 || echo "auval returned non-zero (may be expected without audio device)"

          # List what was built
          echo "=== Built artifacts ==="
          find "$ARTS" -maxdepth 3 -type d \( -name "*.vst3" -o -name "*.component" -o -name "*.app" \)

      # ---- Windows: fix moduleinfo.json trailing commas ----
      - name: Fix moduleinfo.json (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          find build/Collonka_artefacts -name "moduleinfo.json" | while IFS= read -r jsonfile; do
            echo "Fixing trailing commas in: $jsonfile"
            sed -i.bak -E 's/,([[:space:]]*[}\]])/\1/g' "$jsonfile"
            rm -f "${jsonfile}.bak"
          done

      # ---- Windows packaging ----
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          DIST="dist/${{ matrix.artifact_name }}"
          mkdir -p "$DIST/VST3" "$DIST/Standalone" "$DIST/Presets/Factory"
          find build/Collonka_artefacts/Release/VST3 -name "*.vst3" -type d -exec cp -r {} "$DIST/VST3/" \;
          find build/Collonka_artefacts/Release/Standalone -name "*.exe" -exec cp {} "$DIST/Standalone/" \;
          cp Presets/Factory/*.xml "$DIST/Presets/Factory/"

      # ---- macOS packaging ----
      - name: Package (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          DIST="dist/${{ matrix.artifact_name }}"
          mkdir -p "$DIST/VST3" "$DIST/AU" "$DIST/Standalone" "$DIST/Presets/Factory"

          ARTS="build/Collonka_artefacts"
          if [ ! -d "$ARTS/VST3" ] && [ -d "$ARTS/Release/VST3" ]; then
            ARTS="$ARTS/Release"
          fi

          # Copy bundles with ditto so resource forks, xattrs, and code-signature
          # integrity survive (cp -R strips Sealed Resources -> launchd refuses
          # to spawn the .app with "RBSRequestErrorDomain Code=5 Launch failed").
          find "$ARTS" -maxdepth 3 -name "*.vst3" -type d -print0 | while IFS= read -r -d '' src; do
            ditto "$src" "$DIST/VST3/$(basename "$src")"
          done
          find "$ARTS" -maxdepth 3 -name "*.component" -type d -print0 | while IFS= read -r -d '' src; do
            ditto "$src" "$DIST/AU/$(basename "$src")"
          done
          find "$ARTS" -maxdepth 3 -name "*.app" -type d -print0 | while IFS= read -r -d '' src; do
            ditto "$src" "$DIST/Standalone/$(basename "$src")"
          done

          # Presets
          cp Presets/Factory/*.xml "$DIST/Presets/Factory/"

          # Install script
          cat > "$DIST/install.sh" << 'EOF'
          #!/bin/bash
          set -e
          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
          echo "=== Collonka v1.0.0 Installer ==="

          # Remove quarantine from all bundles
          xattr -cr "$SCRIPT_DIR" 2>/dev/null || true

          # VST3 — ditto preserves bundle internals; cp -R strips Sealed Resources.
          VST3_DIR="$HOME/Library/Audio/Plug-Ins/VST3"
          mkdir -p "$VST3_DIR"
          for vst3 in "$SCRIPT_DIR/VST3/"*.vst3; do
            [ -d "$vst3" ] && ditto "$vst3" "$VST3_DIR/$(basename "$vst3")" && echo "VST3: $(basename "$vst3") → $VST3_DIR"
          done

          # AU — same bundle-preservation requirement.
          AU_DIR="$HOME/Library/Audio/Plug-Ins/Components"
          mkdir -p "$AU_DIR"
          for au in "$SCRIPT_DIR/AU/"*.component; do
            [ -d "$au" ] && ditto "$au" "$AU_DIR/$(basename "$au")" && echo "AU: $(basename "$au") → $AU_DIR"
          done

          # Reset AU cache so hosts re-scan
          killall -9 AudioComponentRegistrar 2>/dev/null || true

          # Presets
          PRESET_DIR="$HOME/Library/Application Support/Collonka/Presets/Factory"
          mkdir -p "$PRESET_DIR"
          cp "$SCRIPT_DIR/Presets/Factory/"*.xml "$PRESET_DIR/" 2>/dev/null
          echo "Presets → $PRESET_DIR"

          echo ""
          echo "Done! Restart your DAW and rescan plugins."
          echo "If plugins don't appear, run: sudo xattr -cr ~/Library/Audio/Plug-Ins/"
          EOF
          chmod +x "$DIST/install.sh"

          # Verify
          echo "=== Package contents ==="
          find "$DIST" -type f | head -30

      # ---- Zip on the runner BEFORE upload-artifact ----
      # actions/upload-artifact tars files internally and macOS xattrs / resource
      # forks / code-signature integrity do NOT survive that round trip. By
      # creating the final .zip with `ditto -c -k --sequesterRsrc --keepParent`
      # on the Mac runner itself, the bundles are sealed inside a single opaque
      # file that upload/download treat as a blob.
      - name: Zip for release (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          DIST="dist/${{ matrix.artifact_name }}"
          ditto -c -k --sequesterRsrc --keepParent "$DIST" "${{ matrix.artifact_name }}.zip"
          ls -lh "${{ matrix.artifact_name }}.zip"

      - name: Zip for release (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/${{ matrix.artifact_name }}/*" -DestinationPath "${{ matrix.artifact_name }}.zip" -Force
          Get-Item "${{ matrix.artifact_name }}.zip" | Select-Object Name, Length

      # ---- Upload the zip blob (not the directory) ----
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.zip
          retention-days: 30

  # ---- Release (on tag push) ----
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      # Artifacts are already zip blobs created on each build runner with the
      # OS-native packaging tool (ditto on macOS, Compress-Archive on Windows).
      # Pass them straight to the release without re-extracting / re-zipping.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
          generate_release_notes: true
